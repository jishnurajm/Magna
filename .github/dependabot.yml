version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
    groups:
      laravel-ecosystem:
        patterns:
          - "laravel/*"
          - "filament/*"
          - "livewire/*"
      security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      # Major version upgrades require a dedicated migration — do not auto-open PRs
      - dependency-name: "laravel/framework"
        update-types: ["version-update:semver-major"]
      - dependency-name: "filament/filament"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
