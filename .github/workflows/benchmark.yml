name: Benchmark (nightly)

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC nightly
  workflow_dispatch:       # allow manual trigger

jobs:
  benchmark:
    name: k6 delivery API benchmark
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: magna_bench
          POSTGRES_USER: magna
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U magna"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl, pdo_pgsql, redis, pcntl
          coverage: none

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          {
            echo "DB_CONNECTION=pgsql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=5432"
            echo "DB_DATABASE=magna_bench"
            echo "DB_USERNAME=magna"
            echo "DB_PASSWORD=secret"
            echo "REDIS_HOST=127.0.0.1"
            echo "REDIS_PORT=6379"
            echo "CACHE_STORE=redis"
            echo "MAGNA_INSTALLED=true"
          } >> .env

      - name: Run migrations
        run: php artisan migrate --force

      - name: Seed benchmark data
        run: php artisan magna:bench:seed --fresh

      - name: Install k6
        run: |
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Install FrankenPHP (Octane)
        run: |
          composer require laravel/octane --no-interaction --no-progress
          curl -L https://github.com/dunglas/frankenphp/releases/latest/download/frankenphp-linux-x86_64 \
            -o /usr/local/bin/frankenphp && chmod +x /usr/local/bin/frankenphp

      - name: Start FrankenPHP server
        run: |
          php artisan octane:frankenphp --port=8000 &
          sleep 5

      - name: Run k6 benchmarks
        env:
          BASE_URL: http://localhost:8000
        run: |
          k6 run benchmarks/scenarios.js \
            --out json=benchmarks/results.json \
            --no-color || true

      - name: Compare against baseline (fail on >10% regression)
        run: node benchmarks/compare.js benchmarks/baseline.json benchmarks/results.json

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ github.run_id }}
          path: benchmarks/results.json
          retention-days: 90
