name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write

jobs:
  # ── 1. Full test suite ────────────────────────────────────────────────────────
  test:
    name: Test suite (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: ["8.3", "8.4"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: magna_test
          POSTGRES_USER: magna
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_pgsql, pgsql, redis, gd, mbstring, openssl, fileinfo, bcmath, pcntl, sodium
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: magna_test
          DB_USERNAME: magna
          DB_PASSWORD: secret

      - name: Run test suite (Postgres)
        run: php artisan test --parallel
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: magna_test
          DB_USERNAME: magna
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

      - name: Run PHPStan
        run: php vendor/bin/phpstan analyse --memory-limit=1G --no-progress

      - name: Run Pint (check only)
        run: php vendor/bin/pint --test

  # ── 2. Build release archive ──────────────────────────────────────────────────
  build:
    name: Build release archive
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_pgsql, pgsql, redis, gd, mbstring, openssl, fileinfo, bcmath, pcntl, sodium
          coverage: none

      - name: Install production dependencies
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Determine version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ARCHIVE="magna-cms-${TAG}.tar.gz"

          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='*.test.*' \
            --exclude='.env*' \
            --exclude='benchmarks' \
            --exclude='screenshots' \
            --exclude='plugins-dev' \
            --exclude='storage/app/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='bootstrap/cache/*' \
            -czf "$ARCHIVE" .

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-archive
          path: "magna-cms-${{ steps.version.outputs.tag }}.tar.gz"
          retention-days: 1

  # ── 3. Publish GitHub release ─────────────────────────────────────────────────
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section for this release
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${TAG#v}"

          # Extract the section between ## [VERSION] and the next ## [
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.md

          # Fallback if nothing extracted
          if [ ! -s release_notes.md ]; then
            echo "See CHANGELOG.md for details." > release_notes.md
          fi

      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: release-archive

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Magna CMS ${{ steps.version.outputs.tag }}"
          body_path: release_notes.md
          files: "magna-cms-${{ steps.version.outputs.tag }}.tar.gz"
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
