<svg width="120" height="120" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base Gradient -->
    <linearGradient id="mg" x1="0" y1="0" x2="34" y2="34">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    
    <!-- New Cohesive Electric Neon Gradient -->
    <linearGradient id="neon-glow" x1="0" y1="0" x2="34" y2="34">
      <stop offset="0%" stop-color="#00f2fe"/>  <!-- Electric Cyan -->
      <stop offset="50%" stop-color="#4facfe"/> <!-- Bright Blue -->
      <stop offset="100%" stop-color="#f355da"/> <!-- Hot Magenta -->
    </linearGradient>
    
    <style>
      .running-line {
        /* Total perimeter length of this shape is roughly 84 units */
        stroke-dasharray: 28 56; 
        stroke-dashoffset: 84;
        /* Custom ease curve for an organic, fast-sweeping motion */
        animation: pulse-chase 2s cubic-bezier(0.25, 1, 0.5, 1) infinite;
      }

      @keyframes pulse-chase {
        0% {
          stroke-dasharray: 15 69; /* Starts short */
          stroke-dashoffset: 84;
        }
        40% {
          stroke-dasharray: 38 46; /* Stretches long as it picks up speed */
        }
        100% {
          stroke-dasharray: 15 69; /* Shrinks back down at completion */
          stroke-dashoffset: 0;
        }
      }
    </style>
  </defs>
  
  <!-- Base Outer Shape -->
  <path d="M17 1 31 9v16l-14 8L3 25V9l14-8Z" stroke="url(#mg)" stroke-width="2.4" fill="rgba(99,102,241,.06)"/>
  
  <!-- Animated Running Line Overlap -->
  <path class="running-line" d="M17 1 31 9v16l-14 8L3 25V9l14-8Z" stroke="url(#neon-glow)" stroke-width="2.6" stroke-linecap="round"/>
  
  <!-- Inner "M" Shape -->
  <path d="M10 23V11.5l7 6 7-6V23" stroke="url(#mg)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
